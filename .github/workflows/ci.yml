name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: pip3 install ruff
      - run: ruff check src/ examples/

  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: pip3 install -r requirements.txt
      - run: pip3 install pytest pytest-cov
      - run: pytest tests/ -v --cov=src --cov-report=term-missing
