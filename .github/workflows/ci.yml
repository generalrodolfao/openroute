name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install ruff
          ruff check src/ examples/

  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest tests/ -v --cov=src --cov-report=term-missing
